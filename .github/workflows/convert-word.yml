name: Use Markdown to Word Converter

on:
  push:
    branches:
      - main

jobs:
  markdown-to-word:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Use Markdown to Word Action
        uses: gccloudone/markdown-to-word@main
        with:
          default_title: "[Untitled Document]"
          markdown_file: "sample.md"
          output_file: "output/sample.docx"
          reference_doc: "template/ssc-template-v2.7.dotx"
